query GetConsolidatedWaitlistColumns {
  tableConfigLookup {
    consolidatedWaitlist {
      columns {
        ...TableColumnConfigFields
      }
      filters {
        ...TableFilterConfigFields
      }
    }
  }
}

query GetUnitGroupWaitlistColumns($unitGroupId: ID!) {
  tableConfigLookup {
    unitGroupWaitlist(unitGroupId: $unitGroupId) {
      columns {
        ...TableColumnConfigFields
      }
      filters {
        ...TableFilterConfigFields
      }
    }
  }
}
