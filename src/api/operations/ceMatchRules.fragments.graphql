fragment CeMatchFieldDetails on CeMatchField {
  id
  key
  label
  itemType
  multiple
  expressionField
  pickListReference
  pickListOptions {
    ...PickListOptionFields
  }
}

fragment CeMatchCustomAssessmentFormFields on FormDefinition {
  cacheKey
  identifier
  title
}

fragment CeMatchRuleFields on CeMatchRule {
  id
  name
  ownerType
  expression
  projectTypes
  funders
}

fragment CeMatchRuleAdminSummaryFields on CeMatchRule {
  ...CeMatchRuleFields
  ownerId
  ownerName
  ruleType
  priorityRank
}

fragment CeMatchRuleDetails on CeMatchRule {
  ...CeMatchRuleAdminSummaryFields
  structuredExpression {
    operator
    clauses {
      field
      comparator
      value
    }
  }
}
