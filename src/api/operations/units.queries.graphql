query GetUnits(
  $id: ID!
  $limit: Int = 10
  $offset: Int = 0
  $filters: UnitFilterOptions
  $includeCeFields: Boolean = false
  $includeClientOccupants: Boolean = false
) {
  project(id: $id) {
    id
    units(limit: $limit, offset: $offset, filters: $filters) {
      offset
      limit
      nodesCount
      nodes {
        ...UnitTableRowFields
      }
    }
  }
}

query GetProjectUnitGroups($id: ID!, $limit: Int = 10, $offset: Int = 0) {
  project(id: $id) {
    id
    unitGroups(limit: $limit, offset: $offset) {
      offset
      limit
      nodesCount
      nodes {
        ...UnitGroupFields
        ...UnitGroupCapacityFields
      }
    }
  }
}

query GetUnitGroup($id: ID!) {
  unitGroup(id: $id) {
    ...UnitGroupDetailFields
  }
}

query GetUnit($id: ID!, $includeCeFields: Boolean = false) {
  unit(id: $id) {
    ...UnitDetailFields
  }
}

query GetProjectUnitTypes($id: ID!) {
  project(id: $id) {
    id
    unitTypes {
      ...UnitTypeCapacityFields
    }
  }
}

mutation CreateUnits(
  $input: CreateUnitsInput!
  $includeCeFields: Boolean = false
  $includeClientOccupants: Boolean = false
) {
  createUnits(input: $input) {
    clientMutationId
    units {
      ...UnitTableRowFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation DeleteUnits($input: DeleteUnitsInput!) {
  deleteUnits(input: $input) {
    clientMutationId
    unitIds
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation UpdateUnits(
  $input: UpdateUnitsInput!
  $includeCeFields: Boolean = false
  $includeClientOccupants: Boolean = false
) {
  updateUnits(input: $input) {
    clientMutationId
    units {
      ...UnitTableRowFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation CreateUnitGroup($input: UnitGroupInput!) {
  createUnitGroup(input: $input) {
    unitGroup {
      ...UnitGroupFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation UpdateUnitGroup($input: UnitGroupInput!, $id: ID!) {
  updateUnitGroup(input: $input, id: $id) {
    unitGroup {
      ...UnitGroupDetailFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation DeleteUnitGroup($id: ID!) {
  deleteUnitGroup(id: $id) {
    unitGroup {
      ...UnitGroupDetailFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}
