query GetUnits(
  $id: ID!
  $limit: Int = 10
  $offset: Int = 0
  $filters: UnitFilterOptions
  $ceEnabled: Boolean = false
) {
  project(id: $id) {
    id
    units(limit: $limit, offset: $offset, filters: $filters) {
      offset
      limit
      nodesCount
      nodes {
        ...UnitFields
      }
    }
  }
}

query GetProjectUnitTypes($id: ID!) {
  project(id: $id) {
    id
    unitTypes {
      ...UnitTypeCapacityFields
    }
  }
}

mutation CreateUnits($input: CreateUnitsInput!, $ceEnabled: Boolean = false) {
  createUnits(input: $input) {
    clientMutationId
    units {
      ...UnitFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation DeleteUnits($input: DeleteUnitsInput!) {
  deleteUnits(input: $input) {
    clientMutationId
    unitIds
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation UpdateUnits($input: UpdateUnitsInput!, $ceEnabled: Boolean = false) {
  updateUnits(input: $input) {
    clientMutationId
    units {
      ...UnitFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}
