query GetUnits(
  $id: ID!
  $limit: Int = 10
  $offset: Int = 0
  $filters: UnitFilterOptions
  $includeCeFields: Boolean = false
) {
  project(id: $id) {
    id
    units(limit: $limit, offset: $offset, filters: $filters) {
      offset
      limit
      nodesCount
      nodes {
        ...UnitFields
      }
    }
  }
}

query GetUnitGroups($id: ID!, $limit: Int = 10, $offset: Int = 0) {
  project(id: $id) {
    id
    unitGroups(limit: $limit, offset: $offset) {
      offset
      limit
      nodesCount
      nodes {
        ...UnitGroupFields
      }
    }
  }
}

query GetUnitGroup($id: ID!) {
  unitGroup(id: $id) {
    ...UnitGroupFields
  }
}

query GetUnit($id: ID!, $includeCeFields: Boolean = false) {
  unit(id: $id) {
    ...UnitFields
    latestOpportunity @include(if: $includeCeFields) {
      ...CeOpportunityFields
    }
  }
}

query GetProjectUnitTypes($id: ID!) {
  project(id: $id) {
    id
    unitTypes {
      ...UnitTypeCapacityFields
    }
  }
}

mutation CreateUnits(
  $input: CreateUnitsInput!
  $includeCeFields: Boolean = false
) {
  createUnits(input: $input) {
    clientMutationId
    units {
      ...UnitFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation DeleteUnits($input: DeleteUnitsInput!) {
  deleteUnits(input: $input) {
    clientMutationId
    unitIds
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation UpdateUnits(
  $input: UpdateUnitsInput!
  $includeCeFields: Boolean = false
) {
  updateUnits(input: $input) {
    clientMutationId
    units {
      ...UnitFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation CreateUnitGroup($input: UnitGroupInput!) {
  createUnitGroup(input: $input) {
    unitGroup {
      ...UnitGroupFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}
