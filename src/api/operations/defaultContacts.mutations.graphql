mutation AssignCeDefaultContacts(
  # todo @martha - there is something odd about "default contacts" and "default swimlane assignment" used right next to each other in the same query
  $input: CeDefaultSwimlaneAssignmentInput!
) {
  assignCeDefaultContacts(input: $input) {
    defaultSwimlaneAssignments {
      ...CeDefaultSwimlaneAssignmentFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}
