mutation JoinHousehold(
  $receivingHouseholdId: ID!
  $joiningEnrollmentInputs: [EnrollmentRelationshipInput!]!
) {
  joinHousehold(
    receivingHouseholdId: $receivingHouseholdId
    joiningEnrollmentInputs: $joiningEnrollmentInputs
  ) {
    receivingHousehold {
      ...HouseholdFields
    }
    donorHousehold {
      ...HouseholdFields
    }
  }
}

mutation SplitHousehold($input: SplitHouseholdInput!) {
  splitHousehold(input: $input) {
    newHousehold {
      ...HouseholdFields
    }
    remainingHousehold {
      ...HouseholdFields
    }
  }
}
