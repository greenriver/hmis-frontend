mutation JoinHousehold($input: JoinHouseholdInput!) {
  joinHousehold(input: $input) {
    receivingHousehold {
      ...HouseholdFields
    }
    donorHousehold {
      ...HouseholdFields
    }
  }
}

mutation SplitHousehold($input: SplitHouseholdInput!) {
  splitHousehold(input: $input) {
    newHousehold {
      ...HouseholdFields
    }
    remainingHousehold {
      ...HouseholdFields
    }
  }
}
