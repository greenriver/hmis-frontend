# This fragment is resolved both on an individual household (staff assignment card)
# AND on a table of households (staff assignment optional column)
fragment HouseholdWithStaffAssignments on Household {
  id
  currentStaffAssignments {
    ...StaffAssignmentDetails
  }
}

fragment StaffAssignmentDetails on StaffAssignment {
  id
  user {
    id
    name
  }
  staffAssignmentRelationship
  assignedAt
  unassignedAt
}

# Fragment to resolve details about each household assigned to the current user on My Dashboard
fragment StaffAssignmentWithClients on StaffAssignment {
  id
  user {
    id
    name
  }
  staffAssignmentRelationship
  assignedAt
  unassignedAt
  household {
    id
    anyInProgress
    latestExitDate
    householdClients {
      id
      relationshipToHoH
      client {
        id
        ...ClientName
      }
      enrollment {
        id
        ...EnrollmentRangeFields
        project {
          ...ProjectNameAndType
        }
        organizationName @include(if: $includeOrganizationName)
        moveInDate @include(if: $includeMoveInDate)
        lastContact @include(if: $includeLastContact) {
          contactDate
          contactType
        }
      }
    }
  }
}
