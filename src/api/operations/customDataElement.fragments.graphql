fragment CustomDataElementValueFields on CustomDataElementValue {
  id
  valueBoolean
  valueDate
  valueFloat
  valueInteger
  valueJson
  valueString
  valueText
  # todo @Martha - how does this relate to the problem with the wrong value?
  valueFile {
    ...FileFields
  }
  user {
    ...UserFields
  }
  dateCreated
  dateUpdated
}

fragment CustomDataElementFields on CustomDataElement {
  id
  key
  label
  fieldType
  repeats
  displayHooks
  value {
    ...CustomDataElementValueFields
  }
  values {
    ...CustomDataElementValueFields
  }
}
