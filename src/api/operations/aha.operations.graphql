mutation FetchAhaScore(
  $clientId: ID!
  $lookupCatalyst: String
  $lookupReason: [String!]
) {
  fetchAhaScore(
    clientId: $clientId
    lookupCatalyst: $lookupCatalyst
    lookupReason: $lookupReason
  ) {
    score
    mciQualityIndicator
    dwClientId
    generator
    ahaFailedReason
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation CalculateAltAhaScore(
  $enrollmentId: ID!
  $formDefinitionIdentifier: String!
  $valuesByLinkId: JsonObject!
) {
  calculateAltAhaScore(
    enrollmentId: $enrollmentId
    formDefinitionIdentifier: $formDefinitionIdentifier
    valuesByLinkId: $valuesByLinkId
  ) {
    score
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation FetchVisionLinkFlags($clientId: ID!) {
  fetchVisionLinkFlags(clientId: $clientId) {
    isEligibleRa
    section8
    cityOfPittsburgh
    subsidizedHousing
    recentEvictionCase
    dwClientId
    failedReason
    errors {
      ...ValidationErrorFields
    }
  }
}
