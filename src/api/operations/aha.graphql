mutation FetchAhaScore($clientId: ID!) {
  fetchAhaScore(clientId: $clientId) {
    score
    altAhaFlag
    dwClientId
    generator
    errors {
      ...ValidationErrorFields
    }
  }
}

# todo @martha - pass client ID, just for the sake of logging
mutation CalculateAltAhaScore($valuesByLinkId: JsonObject!) {
  calculateAltAhaScore(valuesByLinkId: $valuesByLinkId) {
    score
    errors {
      ...ValidationErrorFields
    }
  }
}
