mutation CreateCeReferral(
  $opportunityId: ID!
  $clientId: ID
  $sourceEnrollmentId: ID
) {
  createCeReferral(
    opportunityId: $opportunityId
    clientId: $clientId
    sourceEnrollmentId: $sourceEnrollmentId
  ) {
    referral {
      ...CeReferralSummaryFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation StartCeReferralStep($referralId: ID!, $stepId: ID!) {
  startCeReferralStep(referralId: $referralId, stepId: $stepId) {
    step {
      ...CeReferralStepFields
    }
  }
}

mutation SubmitCeReferralStep(
  $referralId: ID!
  $stepId: ID!
  $valuesByLinkId: JsonObject!
  $valuesByFieldName: JsonObject!
  $confirmed: Boolean
  $formDefinitionId: ID!
) {
  submitCeReferralStep(
    referralId: $referralId
    stepId: $stepId
    valuesByLinkId: $valuesByLinkId
    valuesByFieldName: $valuesByFieldName
    confirmed: $confirmed
    formDefinitionId: $formDefinitionId
  ) {
    step {
      ...CeReferralStepFields
    }
    referral {
      ...CeReferralFields
      opportunity {
        ...CeOpportunityFields
      }
      targetEnrollment {
        id
        client {
          id
        }
      }
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation CreateDirectCeReferral(
  $targetUnitGroupId: ID!
  $sourceEnrollmentId: ID!
  $input: JsonObject!
  $confirmed: Boolean
  $formDefinitionId: ID!
) {
  createDirectCeReferral(
    targetUnitGroupId: $targetUnitGroupId
    sourceEnrollmentId: $sourceEnrollmentId
    input: $input
    confirmed: $confirmed
    formDefinitionId: $formDefinitionId
  ) {
    referral {
      ...CeReferralSummaryFields
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation MarkUnitsAvailable(
  $unitIds: [ID!]!
  $includeCeFields: Boolean = true
  $includeClientOccupants: Boolean = false
) {
  markUnitsAvailable(unitIds: $unitIds) {
    units {
      ...UnitTableRowFields
    }
  }
}

mutation MarkUnitsUnavailable(
  $unitIds: [ID!]!
  $includeCeFields: Boolean = true
  $includeClientOccupants: Boolean = false
) {
  markUnitsUnavailable(unitIds: $unitIds) {
    units {
      ...UnitTableRowFields
    }
  }
}

mutation AssignParticipants(
  $referralId: ID!
  $participants: [CeReferralParticipantInput!]!
) {
  assignReferralParticipants(
    referralId: $referralId
    participants: $participants
  ) {
    referral {
      ...CeReferralWithSwimlanes
      steps {
        # Re-resolve steps to update cache in case assignees have changed
        ...CeReferralStepSummaryFields
      }
    }
  }
}

mutation CreateCeReferralNote($referralId: ID!, $note: String!) {
  createCeReferralNote(referralId: $referralId, note: $note) {
    referral {
      ...CeReferralWithNotesAndAuditEvents
    }
  }
}
