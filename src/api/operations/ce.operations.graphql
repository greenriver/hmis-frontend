mutation CreateCeOpportunity($projectId: ID!, $input: CeOpportunityInput!) {
  createCeOpportunity(projectId: $projectId, input: $input) {
    opportunity {
      ...CeOpportunitySummaryFields
    }
  }
}

mutation CreateCeReferral($opportunityId: ID!, $clientId: ID!) {
  createCeReferral(opportunityId: $opportunityId, clientId: $clientId) {
    referral {
      ...CeReferralSummaryFields
    }
  }
}

mutation StartCeReferralStep($referralId: ID!, $stepId: ID!) {
  startCeReferralStep(referralId: $referralId, stepId: $stepId) {
    step {
      ...CeReferralStepFields
    }
  }
}

mutation SubmitCeReferralStep(
  $referralId: ID!
  $stepId: ID!
  $input: JsonObject!
  $confirmed: Boolean
  $formDefinitionId: ID!
) {
  submitCeReferralStep(
    referralId: $referralId
    stepId: $stepId
    input: $input
    confirmed: $confirmed
    formDefinitionId: $formDefinitionId
  ) {
    step {
      ...CeReferralStepFields
    }
    referral {
      ...CeReferralFields
      opportunity {
        ...CeOpportunityFields
      }
      targetEnrollment {
        id
        client {
          id
        }
      }
    }
    errors {
      ...ValidationErrorFields
    }
  }
}

mutation AssignParticipants(
  $referralId: ID!
  $participants: [CeReferralParticipantInput!]!
) {
  assignReferralParticipants(
    referralId: $referralId
    participants: $participants
  ) {
    referral {
      ...CeWithReferralParticipants
    }
  }
}
