fragment SwimlaneFields on CeSwimlane {
  id
  name
  templateIdentifier
  templateName
}

fragment CeDefaultSwimlaneAssignmentFields on CeDefaultSwimlaneAssignment {
  id
  global
  user {
    id
    name
    email
  }
  organization {
    id
    ...OrganizationNameFields
  }
  project {
    id
    ...ProjectNameAndType
  }
  unitGroup {
    id
    name
  }
}

fragment CeProjectDefaultAssignmentFields on CeProjectDefaultAssignment {
  swimlane {
    ...SwimlaneFields
  }
  assignments {
    ...CeDefaultSwimlaneAssignmentFields
  }
}

fragment ProjectWithDefaultSwimlaneAssignments on Project {
  ...ProjectNameAndType
  organization {
    id
    ...OrganizationNameFields
  }
  defaultSwimlaneAssignments {
    ...CeProjectDefaultAssignmentFields
  }
}
