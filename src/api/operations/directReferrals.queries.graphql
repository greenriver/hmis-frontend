query GetDirectReferralFormDefinition($targetUnitGroupId: ID!) {
  directReferralFormDefinition(targetUnitGroupId: $targetUnitGroupId) {
    ...FormDefinitionFields
  }
}

query GetProjectOutgoingDirectCeReferrals(
  $id: ID!
  $limit: Int = 25
  $offset: Int = 0
  $filters: ProjectOutgoingCeReferralFilterOptions = null
) {
  project(id: $id) {
    id
    outgoingDirectCeReferrals(
      limit: $limit
      offset: $offset
      filters: $filters
    ) {
      offset
      limit
      nodesCount
      nodes {
        ...CeOutgoingReferralsTableFields
      }
    }
  }
}
