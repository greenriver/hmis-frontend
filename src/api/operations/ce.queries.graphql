query GetAdminConsolidatedWaitlist(
  $limit: Int = 25
  $offset: Int = 0
) # $filters: ConsolidatedWaitlistFilterOptions = null
{
  ceConsolidatedWaitlist {
    ceClients(limit: $limit, offset: $offset) {
      offset
      limit
      nodesCount
      nodes {
        id
        destinationClientId
        sourceClientIds
        clientName
        aggregatedClientAttributes
      }
    }
  }
}

query GetConsolidatedWaitlistColumns {
  ceConsolidatedWaitlist {
    clientAttributeColumns {
      key
      value
    }
  }
}
query GetCeClientEligibleUnitGroups(
  $id: ID!
  $limit: Int = 25
  $offset: Int = 0
) {
  ceConsolidatedWaitlist {
    ceClient(id: $id) {
      id
      unitGroupsCandidates(limit: $limit, offset: $offset) {
        nodesCount
        nodes {
          ...CeUnitGroupCandidateFields
        }
      }
    }
  }
}
