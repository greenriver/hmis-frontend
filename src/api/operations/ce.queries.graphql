query GetProjectCeOpportunities(
  $id: ID!
  $limit: Int = 25
  $offset: Int = 0
  $filters: ProjectCeOpportunityFilterOptions = null
) {
  project(id: $id) {
    id
    ceOpportunities(limit: $limit, offset: $offset, filters: $filters) {
      offset
      limit
      nodesCount
      nodes {
        ...CeOpportunitySummaryFields
      }
    }
  }
}

query GetProjectCeReferrals(
  $id: ID!
  $limit: Int = 25
  $offset: Int = 0
  $filters: ProjectCeReferralFilterOptions = null
) {
  project(id: $id) {
    id
    ceReferrals(limit: $limit, offset: $offset, filters: $filters) {
      offset
      limit
      nodesCount
      nodes {
        ...CeReferralTableFields
      }
    }
  }
}

query GetCeOpportunity($id: ID!) {
  ceOpportunity(id: $id) {
    ...CeOpportunityFields
  }
}

query GetCeOpportunityCandidates(
  $opportunityId: ID!
  $limit: Int = 25
  $offset: Int = 0
) {
  ceOpportunity(id: $opportunityId) {
    id
    candidatesGeneratedAt
    candidates(limit: $limit, offset: $offset) {
      offset
      limit
      nodesCount
      nodes {
        ...CeCandidateFields
      }
    }
  }
}

query GetCeCandidateSourceEnrollments(
  $opportunityId: ID!
  $candidateId: ID!
  $limit: Int = 100
  $offset: Int = 0
) {
  ceOpportunity(id: $opportunityId) {
    id
    candidateLookup(id: $candidateId) {
      id
      enrollments(limit: $limit, offset: $offset) {
        offset
        limit
        nodesCount
        nodes {
          ...CeReferralSourceEnrollmentFields
        }
      }
    }
  }
}

query GetCeReferral($id: ID!) {
