query GetSwimlanes {
  # expect few enough that we don't need pagination
  ceSwimlanes {
    ...SwimlaneFields
  }
}

query GetDefaultSwimlaneAssignments(
  $limit: Int = 10
  $offset: Int = 0
  $filters: ProjectFilterOptions
  $sortOrder: ProjectSortOption
) {
  projects(
    limit: $limit
    offset: $offset
    filters: $filters
    sortOrder: $sortOrder
  ) {
    offset
    limit
    nodesCount
    nodes {
      ...ProjectWithDefaultSwimlaneAssignments
    }
  }
}

query GetProjectDefaultSwimlaneAssignments($id: ID!) {
  project(id: $id) {
    ...ProjectWithDefaultSwimlaneAssignments
  }
}
