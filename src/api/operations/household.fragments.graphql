fragment HouseholdFields on Household {
  id
  householdSize
  shortId
  householdClients {
    ...HouseholdClientFields
  }
}

fragment HouseholdClientFields on HouseholdClient {
  id
  relationshipToHoH
  client {
    id
    ...ClientName
    ...ClientIdentificationFields
    ...AssessedClientFields
    access {
      ...ClientAccessFields
    }
    externalIds {
      ...ClientIdentifierFields
    }
    alerts {
      ...ClientAlertFields
    }
  }
  enrollment {
    id
    lockVersion
    relationshipToHoH
    ...EnrollmentRangeFields
    autoExited
    currentUnit {
      id
      name
    }
  }
}

fragment ProjectEnrollmentsHouseholdFields on Household {
  id
  householdSize
  shortId
  householdClients {
    ...ProjectEnrollmentsHouseholdClientFields
  }
  ...HouseholdWithStaffAssignments @include(if: $includeStaffAssignment)
}

fragment ProjectEnrollmentsHouseholdClientFields on HouseholdClient {
  id
  relationshipToHoH
  client {
    id
    ...ClientName
    ...ClientIdentificationFields
  }
  enrollment {
    id
    lockVersion
    entryDate
    exitDate
    inProgress
    autoExited
    moveInDate @include(if: $includeMoveInDate)
    lastContact @include(if: $includeLastContact) {
      date
      type
    }
  }
}
