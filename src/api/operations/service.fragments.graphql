fragment ServiceTypeFields on ServiceType {
  id
  name
  hud
  hudRecordType
  hudTypeProvided
  serviceCategory {
    id
    name
  }
  dateCreated
  dateUpdated
  supportsBulkAssignment
}

fragment ServiceBasicFields on Service {
  id
  dateProvided
  serviceType {
    ...ServiceTypeFields
  }
}

fragment ServiceBaseFields on Service {
  id
  dateProvided
  serviceType {
    ...ServiceTypeFields
  }
}

fragment ServiceDetailFields on Service {
  faAmount
  faStartDate
  faEndDate
  movingOnOtherType
  referralOutcome
  subTypeProvided
  otherTypeProvided
  dateCreated
  dateUpdated
  dateDeleted
  user {
    ...UserFields
  }
  customDataElements {
    ...CustomDataElementFields
  }
  formDefinitionId
}

fragment ServiceFields on Service {
  ...ServiceBaseFields
  ...ServiceDetailFields
}

fragment ClientServiceFields on Service {
  ...ServiceBaseFields
  ...ServiceDetailFields @include(if: $includeServiceDetails)
}

fragment ServiceCategoryFields on ServiceCategory {
  id
  name
  serviceTypes {
    offset
    limit
    nodesCount
    nodes {
      id
      name
    }
  }
}
