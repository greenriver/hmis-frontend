# Permissions to resolve globally on the User.
#
# These should be interpreted as "user can view/edit *ANY* <entity>".
#   For example: it will resolve true for 'canEditEnrollments' if the user can edit ANY enrollments.
#   For example: it will resolve true for 'canViewDob' if the user can view dob on ANY clients.
fragment RootPermissions on QueryAccess {
  id
  # Admin permissions:
  canAdministerHmis
  canManageForms
  canAdministrateConfig
  canConfigureDataCollection
  canImpersonateUsers
  canAuditUsers
  canManageDeniedReferrals
  canMergeClients # provides access to admin client merge
  canTransferEnrollments

  # Root Client permissions:
  canViewClients
  canEditClients # globally, determines whether user can add new clients
  canViewDob # globally, determines whether to show col header as "DOB" or "Age"
  canViewClientAlerts

  # Application permissions:
  canViewMyDashboard

  # Root Project permissions:
  canEditOrganization # globally, determines whether user can create organization
  canEditProjectDetails # globally, determines whether user can create project
}

# Permissions on Client to determine what to show on the Client Dashboard
#
# Note: This often also gets resolved on Enrollment. It would be better if we split that out into a separate fragment,
# because the Enrollment often doesn't need many of these fields (e.g. canMergeClients, canManagScanCards, ..)
fragment ClientAccessFields on ClientAccess {
  id
  canEditClient
  canDeleteClient
  canViewDob
  canViewFullSsn
  canViewPartialSsn
  canViewClientName
  canViewClientPhoto
  canViewEnrollmentDetails
  canAuditClients
  canManageScanCards
  canMergeClients
  canViewClientAlerts
  canManageClientAlerts
  canViewAnyFiles

  # The below perms could be pulled out and fetched on Client Files tab, for perf improvement
  canManageAnyClientFiles
  canManageOwnClientFiles
  canUploadClientFiles
}

fragment EnrollmentAccessFields on EnrollmentAccess {
  id
  canEditEnrollments
  canDeleteEnrollments
  canAuditEnrollments
  canViewEnrollmentLocationMap
}

fragment AssessmentAccessFields on AssessmentAccess {
  id
  canDeleteAssessments
  canDeleteEnrollments
  canEditEnrollments
}

fragment ProjectAccessFields on ProjectAccess {
  id
  canDeleteProject
  canEnrollClients
  canEditEnrollments
  canViewEnrollmentDetails
  canEditProjectDetails
  canViewUnits
  canManageUnits
  canManageIncomingReferrals
  canManageOutgoingReferrals
  canManageExternalFormSubmissions
}

fragment OrganizationAccessFields on OrganizationAccess {
  id
  canEditOrganization
  canDeleteOrganization
}
