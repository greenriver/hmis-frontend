fragment CeOpportunitySummaryFields on CeOpportunity {
  id
  name
  categories
  status
  active
  expiresAt
  projectId
  projectName
}

fragment CeOpportunityFields on CeOpportunity {
  ...CeOpportunitySummaryFields
  referral {
    ...CeReferralSummaryFields
  }
  eligibilityRequirements {
    ...CeMatchRuleFields
  }
  priorityScheme {
    ...CeMatchRuleFields
  }
}

fragment ClientCeOpportunitySummaryFields on CeOpportunity {
  ...CeOpportunitySummaryFields
  projectType
}

fragment CeMatchRuleFields on CeMatchRule {
  id
  name
  ownerType
}

fragment CeCandidateFields on CeCandidate {
  id
  priorityScore
  clientId
  client {
    ...ClientName
  }
}

fragment CeReferralSummaryFields on CeReferral {
  id
  status
  active
  clientId
  client {
    id
    ...ClientName
  }
}

fragment CeReferralTableFields on CeReferral {
  ...CeReferralSummaryFields
  createdAt
  opportunity {
    id
    name
  }
  currentStepName
  referredBy {
    id
    name
  }
}

fragment ClientCeReferralTableFields on CeReferral {
  ...CeReferralTableFields
  targetProjectId
  targetProjectName
  targetProjectType
}

fragment CeReferralFields on CeReferral {
  ...CeReferralSummaryFields
  steps {
    ...CeReferralStepSummaryFields
  }
  opportunity {
    ...CeOpportunitySummaryFields
  }
  targetEnrollment {
    id
    client {
      id
    }
  }
}

fragment CeReferralStepSummaryFields on CeReferralStep {
  id
  stepId
  name
  status
  swimlane
}

fragment CeReferralStepFields on CeReferralStep {
  ...CeReferralStepSummaryFields
  formDefinition {
    ...FormDefinitionFields
  }
  submittedValues
}
