fragment CeOpportunitySummaryFields on CeOpportunity {
  id
  name
  status
  active
  projectId
  projectName
  unit {
    id
    name
    unitType {
      id
      description
    }
    unitGroup {
      id
      name
    }
  }
  dateAvailable
}

fragment CeOpportunityFields on CeOpportunity {
  ...CeOpportunitySummaryFields
  stale
  candidatesGeneratedAt
  referral {
    ...CeReferralSummaryFields
  }
}

fragment CeOpportunityAdminFields on CeOpportunity {
  ...CeOpportunitySummaryFields
  projectType
  organizationName
  dateAvailable
  unit {
    id
    name
  }
}

fragment ClientCeOpportunitySummaryFields on CeOpportunity {
  candidatesGeneratedAt
  ...CeOpportunitySummaryFields
  projectType
}

fragment CeMatchRuleFields on CeMatchRule {
  id
  name
  ownerType
  expression
  projectTypes
  funders
}

fragment CeCandidateFields on CeCandidate {
  id
  priorityScores
  clientName
  clientAttributes
}

fragment CeReferralSummaryFields on CeReferral {
  id
  status
  customStatus {
    id
    key
    name
  }
  active
  clientId
  clientName
  origin
}

fragment CeReferralTableFields on CeReferral {
  ...CeReferralSummaryFields
  createdAt
  opportunity {
    id
    name
  }
  currentSteps {
    id
    name
    swimlane
    assignees {
      id
      name
    }
  }
  daysOnCurrentSteps
  referredBy {
    id
    name
  }
}

fragment CeOutgoingReferralsTableFields on CeReferral {
  id
  status
  createdAt
  customStatus {
    id
    key
    name
  }
  clientId
  clientName
  client {
    ...ClientName
  }
  sourceEnrollmentId
  targetProjectId
  targetProjectName
  targetProjectType
  referredBy {
    id
    name
  }
  access {
    canViewReferralDetails
    canViewSourceEnrollmentDetails
  }
}

fragment CeReferralWithProjectFields on CeReferral {
  id
  targetProjectId
  targetProjectName
  targetProjectType
}

fragment CeReferralWithProjectAccessFields on CeReferral {
  id
  ...CeReferralWithProjectFields
}

fragment CeReferralAdminFields on CeReferral {
  ...CeReferralTableFields
  ...CeReferralWithProjectFields
  targetEnrollment {
    id
  }
  client {
    id
  }
  targetOrganizationName
  updatedBy {
    id
    name
  }
  opportunity {
    id
    name
    unit @include(if: $includeUnit) {
      id
      name
      unitType {
        ...UnitTypeFields
      }
    }
  }
}

fragment ClientCeReferralTableFields on CeReferral {
  ...CeReferralTableFields
  ...CeReferralWithProjectAccessFields
}

fragment CeReferralAuditEventFields on CeReferralAuditEvent {
  id
  createdAt
  type
  stepName
  user {
    id
    name
  }
}

# Fields for the "detail" panel on an individual referral
fragment CeReferralDetailFields on CeReferral {
  createdAt
  clientName
  clientAge
  client {
    id
    externalIds {
      ...ClientIdentifierFields
    }
  }
  sourceEnrollment {
    id
    projectName
    projectType
    entryDate
    exitDate
    householdMembers {
      id
      clientId
      clientName
      relationshipToHoH
      access {
        canViewClients
      }
    }
  }
  currentMatchValues {
    id
    fieldName
    fieldValues
  }
  opportunity {
    id
    eligibilityRequirements {
      ...CeMatchRuleFields
    }
  }
}

fragment CeReferralNoteFields on CeReferralNote {
  id
  createdAt
  note
  user {
    id
    name
  }
}

fragment CeReferralFields on CeReferral {
  ...CeReferralSummaryFields
  ...CeReferralWithSwimlanes
  ...CeReferralDetailFields
  workflowTemplateName
  steps {
    ...CeReferralStepSummaryFields
  }
  opportunity {
    ...CeOpportunitySummaryFields
  }
  targetProjectName
  targetEnrollment {
    id
    client {
      id
    }
  }
  ...CeReferralWithNotesAndAuditEvents
  targetProjectId
  access {
    canAssignReferralTasks
    canViewSourceEnrollmentDetails
    canViewTargetProject
    canCreateReferralNote
  }
}

# In the future, we may paginate these in the UI; for now, just query all, with a high query cap
fragment CeReferralWithNotesAndAuditEvents on CeReferral {
  id
  auditEvents(limit: 200) {
    nodesCount
    nodes {
      ...CeReferralAuditEventFields
    }
  }
  notes(limit: 200) {
    nodesCount
    nodes {
      ...CeReferralNoteFields
    }
  }
}

fragment CeReferralSwimlaneFields on CeReferralSwimlane {
  id
  name
  participants {
    id
    name
  }
}

fragment CeReferralWithSwimlanes on CeReferral {
  id
  swimlanes {
    ...CeReferralSwimlaneFields
  }
}

fragment CeReferralStepSummaryFields on CeReferralStep {
  id
  stepId
  name
  status
  swimlane
  assignees {
    id
    name
  }
  availableAt
  updatedAt
  updatedBy {
    id
    name
  }
  access {
    canPerformStep
  }
}

fragment CeReferralStepFields on CeReferralStep {
  ...CeReferralStepSummaryFields
  formDefinition {
    ...FormDefinitionFields
  }
  customDataElements {
    ...CustomDataElementFields
  }
}

# used for resolving assigned steps on the User Dashboard
fragment UserCeReferralStepFields on CeReferralStep {
  id
  stepId
  name
  availableAt
  status
  assignees {
    id
    name
  }
  referral {
    id
    ...CeReferralWithProjectAccessFields
    opportunity {
      id
    }
    clientId
    clientName
  }
}

fragment CeReferralSourceEnrollmentFields on CeReferralSourceEnrollment {
  id
  sourceClientId
  clientName
  dataSource {
    id
    name
    isCurrentDataSource
  }
  projectName
  projectType
  entryDate
  exitDate
  inProgress
  autoExited
  relationshipToHoH
  householdSize
  householdMembers {
    id
    clientId
    relationshipToHoH
    clientName
  }
  assessments {
    id
    assessmentName
    assessmentDate
    dateUpdated
  }
  access {
    canViewEnrollmentDetails
  }
}

# CE Client (backed by Client Proxy) is used on the global eligible clients list
fragment CeClientFields on CeClient {
  id
  destinationClientId
  viewableSourceClientIds
  clientName
  clientAttributes
  externalIds {
    ...ClientIdentifierFields
  }
}

# Used on the global eligible clients list. Unit Groups that a given CE Client is eligible for.
fragment CeEligibleUnitGroupFields on CeEligibleUnitGroup {
  id
  unitGroupName
  projectName
  projectId
  projectType
  organizationName
  candidateUpdatedAt
  unitsAcceptingReferrals
}
