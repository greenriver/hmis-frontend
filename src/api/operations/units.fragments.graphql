fragment UnitTypeCapacityFields on UnitTypeCapacity {
  id
  unitType
  capacity
  availability
}

fragment UnitTypeFields on UnitTypeObject {
  id
  description
  bedType
  unitSize
  dateUpdated
  dateCreated
}

fragment UnitTableRowFields on Unit {
  id
  name
  unitSize
  unitType {
    ...UnitTypeFields
  }
  occupancyStatus
  deletable
  occupants @include(if: $includeClientOccupants) {
    id
    relationshipToHoH
    client {
      id
      ...ClientName
    }
  }
  unitGroup {
    ...UnitGroupFields
  }
  ...UnitWithCeFields @include(if: $includeCeFields)
}

fragment UnitFields on Unit {
  id
  name
  unitSize
  unitType {
    ...UnitTypeFields
  }
  unitGroup {
    ...UnitGroupFields
  }
  ...UnitWithCeFields @include(if: $includeCeFields)
}

fragment UnitDetailFields on Unit {
  ...UnitFields
  eligibilityRequirements {
    ...CeMatchRuleFields
  }
  priorityScheme {
    ...CeMatchRuleFields
  }
  latestOpportunity @include(if: $includeCeFields) {
    ...CeOpportunityFields
    candidates(limit: 1, offset: 0) {
      offset
      limit
      nodesCount
      nodes {
        ...CeCandidateFields
      }
    }
  }
}

fragment UnitWithCeFields on Unit {
  # remove?
  latestOpportunity {
    ...CeOpportunitySummaryFields
    referral {
      ...CeReferralSummaryFields
    }
  }
  acceptingCeReferrals
  workflowTemplateName
}

fragment UnitGroupFields on UnitGroup {
  id
  name
}

fragment UnitGroupCapacityFields on UnitGroup {
  id
  name
  capacity
  availability
  utilization
}

fragment UnitGroupDetailFields on UnitGroup {
  ...UnitGroupCapacityFields
  workflowTemplateName
  workflowTemplateIdentifier
  eligibilityRequirements {
    ...CeMatchRuleFields
  }
  priorityScheme {
    ...CeMatchRuleFields
  }
}
