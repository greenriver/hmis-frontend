fragment UnitTypeCapacityFields on UnitTypeCapacity {
  id
  unitType
  capacity
  availability
}

fragment UnitTypeFields on UnitTypeObject {
  id
  description
  bedType
  unitSize
  dateUpdated
  dateCreated
}

fragment UnitTableRowFields on Unit {
  id
  name
  unitSize
  unitType {
    ...UnitTypeFields
  }
  occupancyStatus
  deletable
  occupants @include(if: $includeClientOccupants) {
    id
    relationshipToHoH
    client {
      id
      ...ClientName
    }
  }
  unitGroup {
    ...UnitGroupFields
  }
  ...UnitWithCeFields @include(if: $includeCeFields)
}

fragment UnitDetailFields on Unit {
  id
  name
  unitSize
  acceptingCeReferrals
  canBeMarkedAvailableToday
  unitType {
    ...UnitTypeFields
  }
  unitGroup {
    ...UnitGroupFields
  }
  eligibilityRequirements @include(if: $includeCeFields) {
    ...CeMatchRuleFields
  }
  prioritySchemes @include(if: $includeCeFields) {
    ...CeMatchRuleFields
  }
  latestOpportunity @include(if: $includeCeFields) {
    ...CeOpportunityFields
    candidates(limit: 1, offset: 0, filters: { excludeDeclinedClients: true }) {
      offset
      limit
      nodesCount
      nodes {
        ...CeCandidateFields
      }
    }
  }
}

fragment UnitWithCeFields on Unit {
  latestOpportunity {
    ...CeOpportunitySummaryFields
    referral {
      ...CeReferralSummaryFields
    }
  }
  canBeMarkedAvailable
  canBeMarkedAvailableToday
  canBeMarkedUnavailable
  acceptingCeReferrals
}

fragment UnitGroupFields on UnitGroup {
  id
  name
  workflowTemplateIdentifier
  unitType {
    id
    description
  }
}

fragment UnitGroupCapacityFields on UnitGroup {
  id
  name
  capacity
  availability
  unitTypes {
    ...UnitTypeCapacityFields
  }
}

fragment UnitGroupDetailFields on UnitGroup {
  ...UnitGroupCapacityFields
  workflowTemplateName
  ceEventType
  workflowTemplateIdentifier
  directReferralWorkflowTemplateName
  directReferralWorkflowTemplateIdentifier
  eligibilityRequirements {
    ...CeMatchRuleFields
  }
  prioritySchemes {
    ...CeMatchRuleFields
  }
  unitType {
    id
    description
  }
}
