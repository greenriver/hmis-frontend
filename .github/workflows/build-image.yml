name: 'Build and Scan Container'

on:
  workflow_dispatch:
  pull_request:
    branches:
      - stable
      - 'release-*'
  push:
    branches:
      - "*"
      - "**/*"

# You can kill currently running builds on the branch this way
#concurrency:
#  group: ${{ github.ref }}-ci
#  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0 https://github.com/docker/login-action/tags
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/tags

      - name: Setup buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0 https://github.com/docker/setup-buildx-action/tags

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1 https://github.com/aws-actions/configure-aws-credentials/tags
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE }}
          role-session-name: github-action

      - name: Export environment variables
        id: env
        env:
          SHA: ${{ github.sha }}
        run: |
          export NODE_VERSION=`cat .nvmrc`
          export GITHASH="${SHA::7}"
          export GITHASH_9="${SHA::9}"
          export IMAGE_TAG="githash-${GITHASH}"
          export IMAGE_TAG_9="githash-${GITHASH_9}"

          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "git_hash=$GITHASH" >> $GITHUB_OUTPUT
          echo "git_hash_9=$GITHASH_9" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_tag_9=$IMAGE_TAG_9" >> $GITHUB_OUTPUT

      # Build and scan on PRs
      - name: Build container image for PR
        if: github.event_name == 'pull_request'
        id: vuln_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2 https://github.com/docker/build-push-action/tags
        with:
          push: false
          file: docker/Dockerfile
          tags: ${{ secrets.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}
          outputs: type=docker
          build-args: |
            NODE_VERSION=${{ steps.env.outputs.node_version }}
            GITHASH=${{ steps.env.outputs.git_hash }}
            FULL_GITHASH=${{ github.event.pull_request.head.sha }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Run vulnerability scan for PR
        if: github.event_name == 'pull_request'
        id: vuln_scan
        uses: aquasecurity/trivy-action@0.28.0
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db:2"
          TRIVY_JAVA_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-java-db:1"
        with:
          image-ref: ${{ secrets.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # Build scan and push to ECR
      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@5a88a04c91d5c6f97aae0d9be790e64d9b1d47b7 # v1.7.1 https://github.com/aws-actions/amazon-ecr-login/tags
        with:
          mask-password: true

      - name: Build container image
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2 https://github.com/docker/build-push-action/tags
        with:
          push: false
          file: docker/Dockerfile
          tags: ${{ secrets.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}
          outputs: type=docker
          build-args: |
            NODE_VERSION=${{ steps.env.outputs.node_version }}
            GITHASH=${{ steps.env.outputs.git_hash }}
            FULL_GITHASH=${{ github.sha }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      # log medium vulnerabilities
      - name: Run scan for medium vulnerabilities
        if: github.event_name != 'pull_request'
        id: scan_medium
        uses: aquasecurity/trivy-action@0.28.0
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db:2"
          TRIVY_JAVA_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-java-db:1"
        continue-on-error: true
        with:
          image-ref: ${{ secrets.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'MEDIUM'

      # fail on critical and high vulnerabilities
      - name: Run scan for critical and high vulnerabilities
        if: github.event_name != 'pull_request'
        id: scan_crit
        uses: aquasecurity/trivy-action@0.28.0
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db:2"
          TRIVY_JAVA_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-java-db:1"
        with:
          image-ref: ${{ secrets.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Test container
        if: github.event_name != 'pull_request'
        id: test
        env:
          image: ${{ secrets.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}
        shell: bash
        run: |
          ./bin/test-container $image

      - name: Set Docker remote
        if: ${{ github.event_name != 'pull_request' }}
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0 https://github.com/docker/metadata-action/tags
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 7
        with:
          images: ${{ secrets.AWS_ECR_REGISTRY }}
          tags: |
            ${{ steps.env.outputs.image_tag }}
            ${{ steps.env.outputs.image_tag_9 }}
            type=raw,event=branch,value=branch-{{branch}}-{{sha}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'stable') }}
            type=raw,value=stable,enable=${{ github.ref == format('refs/heads/{0}', 'stable') }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Report
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.metadata.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

      - name: Build and push container image
        if: ${{ github.event_name != 'pull_request' }}
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2 https://github.com/docker/build-push-action/tags
        with:
          push: ${{ github.event_name != 'pull_request' }}
          file: docker/Dockerfile
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}
          #tags: ${{ secrets.AWS_ECR_REGISTRY }}:${{ steps.env.outputs.image_tag }}
          build-args: |
            NODE_VERSION=${{ steps.env.outputs.node_version }}
            GITHASH=${{ steps.env.outputs.git_hash }}
            FULL_GITHASH=${{ github.sha }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
