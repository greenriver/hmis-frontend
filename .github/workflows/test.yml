name: Build and test app

on:
  push:
    branches:
      - stable
      - 'release-*'
  pull_request:
    branches:
      - stable
      - 'release-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/tags
      with:
        fetch-depth: 0 # needed for chromatic
    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 https://github.com/actions/setup-node/tags
      with:
        node-version-file: '.nvmrc'
    - name: Install dependencies
      run: |
        corepack enable
        yarn install
    # - name: Audit dependencies
    #   run: |
    #     yarn audit --groups dependencies
    - name: Lint and Format
      run: |
        yarn tsc
        yarn format:check
        yarn lint:check
    - name: Test
      run: |
        yarn test
    - name: Check dependencies
      run: |
        yarn yarn-deduplicate --list --fail
    - name: Storybook smoke test
      run: |
        yarn storybook --smoke-test
    - name: Run Chromatic
      id: chromatic
      uses: chromaui/action@0794e6939fe40ce46a88963f818092afc427da5b # v15
      with:
        projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        zip: true
        exitZeroOnChanges: true
        onlyChanged: true
    - name: Storybook test
      run: |
        npx playwright install --with-deps
        yarn test-storybook --testTimeout 15000
      env:
        TARGET_URL: '${{ steps.chromatic.outputs.storybookUrl }}'
